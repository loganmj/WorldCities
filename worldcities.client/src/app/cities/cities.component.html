<h1>Cities</h1>

<p>Here's a list of cities:</p>

<p *ngIf="!cities"><em>Loading ...</em></p>

<!-- Angular Materials table -->
<table mat-table [dataSource]="cities"
       class="mat-elevation-z8"
       [hidden]="!cities">

  <!-- Header row -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <!-- Data rows -->
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <!-- ID column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let city">{{city.id}}</td>
  </ng-container>

  <!-- Name column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let city">{{city.name}}</td>
  </ng-container>

  <!-- Latitude column -->
  <ng-container matColumnDef="latitude">
    <th mat-header-cell *matHeaderCellDef>latitude</th>
    <td mat-cell *matCellDef="let city">{{city.latitude}}</td>
  </ng-container>

  <!-- Longitude column -->
  <ng-container matColumnDef="longitude">
    <th mat-header-cell *matHeaderCellDef>Longitude</th>
    <td mat-cell *matCellDef="let city">{{city.longitude}}</td>
  </ng-container>

</table>
